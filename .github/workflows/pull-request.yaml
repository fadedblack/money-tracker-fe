name: Build and Test
run-name: Running Build and Testing the changes
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  Build-Application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build web
        run: npx expo export --platform web
